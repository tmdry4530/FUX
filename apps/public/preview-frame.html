<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; }
  body { width: 636px; height: 1048px; overflow: hidden; background: #fff; }
  iframe { width: 636px; height: 1048px; border: none; }
</style>
</head>
<body>
  <iframe id="app" src="http://localhost:3001/"></iframe>
  <script>
    // Clear storage in iframe on load
    document.getElementById('app').addEventListener('load', () => {
      try { document.getElementById('app').contentWindow.localStorage.clear(); } catch(e) {}
    });
  </script>
</body>
</html>
